<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カートゲーム</title>

<style>
body{
margin:0;
background:#87ceeb;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:white;
margin:10px;
}

canvas{
background:#66c266;
border:3px solid #333;
}

.controls{
margin-top:10px;
}

button{
font-size:22px;
padding:12px 18px;
margin:5px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

button:active{
background:#777;
}
</style>
</head>

<body>

<h1>マリオカート風レーシング</h1>

<canvas id="game" width="400" height="300"></canvas>

<div class="controls">
<button onclick="left()">⬅️</button>
<button onclick="right()">➡️</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let playerX = 0;
let speed = 5;
let roadOffset = 0;

let obstacles = [];

function spawnObstacle(){
obstacles.push({
x:Math.random()*2-1,
z:100
});
}

setInterval(spawnObstacle,1500);

function drawRoad(){

roadOffset += speed;

for(let i=0;i<30;i++){

let z = i*20 - (roadOffset%20);

let scale = 300/(z+200);

let roadWidth = 200*scale;

let x = canvas.width/2 - roadWidth/2 + playerX*100;

let y = canvas.height - z;

ctx.fillStyle = "#555";
ctx.fillRect(x,y,roadWidth,4);

}

}

function drawPlayer(){

ctx.fillStyle="red";

ctx.fillRect(canvas.width/2 + playerX*100 -10,canvas.height-40,20,20);

}

function drawObstacles(){

ctx.fillStyle="yellow";

obstacles.forEach(o=>{

o.z -= speed;

let scale = 300/(o.z+200);

let x = canvas.width/2 + o.x*100*scale + playerX*100 -10;

let y = canvas.height - o.z;

ctx.fillRect(x,y,20*scale,20*scale);

});

obstacles = obstacles.filter(o=>o.z>0);

}

function checkCollision(){

obstacles.forEach(o=>{

if(o.z<40 && o.z>10){

if(Math.abs(o.x-playerX)<0.2){

alert("クラッシュ！");
location.reload();

}

}

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRoad();

drawObstacles();

drawPlayer();

checkCollision();

requestAnimationFrame(draw);

}

draw();

function left(){
playerX -= 0.1;
}

function right(){
playerX += 0.1;
}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") left();

if(e.key==="ArrowRight") right();

});

</script>

</body>
</html>
