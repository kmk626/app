<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マリオ風ジャンプゲーム</title>

<style>
body{
margin:0;
background:#5ec0ff;
font-family:sans-serif;
text-align:center;
}

h1{
margin:10px;
color:white;
}

canvas{
background:#87ceeb;
border:3px solid #333;
}

.controls{
margin-top:10px;
}

button{
font-size:22px;
padding:12px 16px;
margin:5px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

button:active{
background:#777;
}
</style>
</head>

<body>

<h1>マリオ風ジャンプゲーム</h1>

<canvas id="game" width="400" height="250"></canvas>

<div class="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="jump()">⬆️</button>
<button onclick="moveRight()">➡️</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
x:50,
y:150,
w:20,
h:20,
vx:0,
vy:0,
jump:false
};

let gravity = 0.5;
let cameraX = 0;

let platforms = [
{x:0,y:200,w:300,h:20},
{x:350,y:180,w:120,h:20},
{x:520,y:160,w:120,h:20},
{x:700,y:200,w:200,h:20},
{x:950,y:150,w:120,h:20},
{x:1100,y:200,w:300,h:20}
];

function drawPlayer(){
ctx.fillStyle="red";
ctx.fillRect(player.x-cameraX,player.y,player.w,player.h);
}

function drawPlatforms(){
ctx.fillStyle="#654321";

platforms.forEach(p=>{
ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
});
}

function update(){

player.vy += gravity;

player.x += player.vx;
player.y += player.vy;

player.jump = true;

platforms.forEach(p=>{
if(
player.x < p.x + p.w &&
player.x + player.w > p.x &&
player.y + player.h < p.y + 10 &&
player.y + player.h + player.vy >= p.y
){
player.y = p.y - player.h;
player.vy = 0;
player.jump = false;
}
});

if(player.x - cameraX > 250){
cameraX = player.x - 250;
}

player.vx *= 0.8;
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawPlatforms();
drawPlayer();

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

function moveLeft(){
player.vx = -3;
}

function moveRight(){
player.vx = 3;
}

function jump(){
if(!player.jump){
player.vy = -10;
player.jump = true;
}
}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") player.vx=-3;

if(e.key==="ArrowRight") player.vx=3;

if(e.key==="ArrowUp") jump();

});

</script>

</body>
</html>
